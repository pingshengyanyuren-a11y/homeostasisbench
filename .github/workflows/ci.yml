name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run tests
        run: |
          python -m unittest discover -s ./bio_swarm_pilot/tests -v

      - name: Smoke run
        run: |
          python -m bio_swarm_pilot --steps 20 --replicates 1 --seed 42 --output-dir ./bio_swarm_pilot/outputs/ci_smoke
